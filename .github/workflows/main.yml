name: Build update-binary (ARM32) - STRIKE 2 (Minimalist)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  build-minimalist:
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🧹 Purge Old Logs (Sesuai cara Suhu)
        run: |
          CURRENT_RUN_ID="${{ github.run_id }}"
          gh run list --limit 50 --json databaseId -q '.[].databaseId' | grep -v "$CURRENT_RUN_ID" | xargs -I{} gh run delete {} || echo "Log aman."
          # Jaga folder sakti .github dan vendor.tar.gz
          find . -maxdepth 1 ! -name '.git' ! -name '.github' ! -name 'vendor.tar.gz' ! -name '.' -exec rm -rf {} +

      - name: Setup Android NDK (r25c)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "NDK=${{ github.workspace }}/android-ndk-r25c" >> $GITHUB_ENV

      - name: ✍️ Create Minimalist Updater Source
        run: |
          # Kita bikin source C super simpel yang tugasnya cuma jalanin shell script
          # Ini trik yang dipake banyak custom flasher modern biar gak ribet sama AOSP
          cat <<EOF > update_binary.c
          #include <stdio.h>
          #include <stdlib.h>
          #include <unistd.h>

          int main(int argc, char** argv) {
              // Recovery ngirim 3 argumen: versi, pipe buat progress bar, sama path zip
              if (argc != 4) {
                  fprintf(stderr, "Usage: %s <version> <pipe> <zip>\n", argv[0]);
                  // Tetep jalanin aja biar gak gagal
              }

              printf("Starting Universal Bridge Updater...\n");
              
              // Strategi ala universal-flasher: 
              // Panggil shell buat eksekusi script utama di dalem zip atau tmp
              // Kita asumsikan script utama namanya 'updater.sh'
              setenv("UPDATE_PACKAGE", argv[3], 1);
              system("/sbin/sh /tmp/updater.sh");
              
              return 0;
          }
          EOF

      - name: 🏗️ Build Static Binary
        run: |
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export CC=$TOOLCHAIN/bin/armv7a-linux-androideabi30-clang
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          
          mkdir -p build_out
          
          # Compile STATIS total, gak butuh library macem-macem
          $CC -O3 -static update_binary.c -o build_out/update-binary
          
          $STRIP build_out/update-binary
          echo "✅ Build Sukses!"
          ls -lh build_out/update-binary

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-binary-minimalist
          path: build_out/update-binary
