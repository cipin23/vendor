name: Build update-binary (ARM32) - STRIKE 3 (Smart Bridge)

on:
  workflow_dispatch:

jobs:
  build-smart-bridge:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK (r25c)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "NDK=${{ github.workspace }}/android-ndk-r25c" >> $GITHUB_ENV

      - name: ✍️ Create Smart Updater Source
        run: |
          cat <<EOF > update_binary.c
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <unistd.h>

          int main(int argc, char** argv) {
              if (argc < 4) return 1;

              char* zip_path = argv[3]; // Path file ZIP ada di argumen ke-4
              char cmd[512];

              printf("Pabrik Rujak Bebeg v3.0 starting...\n");
              printf("ZIP: %s\n", zip_path);

              // 1. Ekstrak file 'install.sh' dari dalem ZIP ke /tmp/
              // Kita pake unzip bawaan recovery
              sprintf(cmd, "/sbin/unzip -o %s install.sh -d /tmp/", zip_path);
              system(cmd);

              // 2. Kasih ijin eksekusi
              system("chmod 755 /tmp/install.sh");

              // 3. Jalankan script-nya dan oper argumen ZIP-nya
              printf("Executing install.sh...\n");
              sprintf(cmd, "/sbin/sh /tmp/install.sh %s", zip_path);
              int res = system(cmd);

              if (res == 0) {
                  printf("Instalasi Selesai dengan Mantap!\n");
              } else {
                  printf("Instalasi Gagal Total, Cek Lagi Brooh!\n");
              }

              return res;
          }
          EOF

      - name: 🏗️ Build Static Binary
        run: |
          export CC=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi30-clang
          $CC -O3 -static update_binary.c -o update-binary
          strip update-binary

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: update-binary-strike3
          path: update-binary
