name: Build update-binary (ARM32) - THE FINAL BOSS FIX

on:
  workflow_dispatch:

jobs:
  build-final:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🧹 Cleanup Log & Repo
        run: |
          CURRENT_RUN_ID="${{ github.run_id }}"
          gh run list --limit 50 --json databaseId -q '.[].databaseId' | grep -v "$CURRENT_RUN_ID" | xargs -I{} gh run delete {} || echo "Clean."
          find . -maxdepth 1 ! -name '.git' ! -name '.github' ! -name 'vendor.tar.gz' ! -name '.' -exec rm -rf {} +

      - name: Setup NDK (r25c)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "NDK=${{ github.workspace }}/android-ndk-r25c" >> $GITHUB_ENV

      - name: ✍️ Create Smart Bridge Source
        run: |
          cat <<EOF > update_binary.c
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <unistd.h>
          #include <sys/stat.h>

          int main(int argc, char** argv) {
              if (argc < 4) return 1;
              char* pipe_fd = argv[2];
              char* zip_path = argv[3];
              char cmd[1024];

              printf("--- RUJAK BEBEG FINAL ENGINE ---\n");
              
              // Ekstrak updater.sh dari ZIP
              sprintf(cmd, "/sbin/unzip -o %s \"META-INF/com/google/android/updater.sh\" -j -d /tmp", zip_path);
              if (system(cmd) != 0) {
                  printf("Gagal ekstrak updater.sh! Cek isi ZIP loe.\n");
                  return 1;
              }

              chmod("/tmp/updater.sh", 0755);

              // Eksekusi script utama
              sprintf(cmd, "/sbin/sh /tmp/updater.sh %s %s %s", zip_path, pipe_fd, argv[1]);
              return system(cmd);
          }
          EOF

      - name: 🏗️ Build Static Binary (Fix Strip)
        run: |
          # Set path toolchain biar rapi
          TOOLCHAIN_PATH=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          CC=$TOOLCHAIN_PATH/armv7a-linux-androideabi30-clang
          STRIP=$TOOLCHAIN_PATH/llvm-strip
          
          # Compile Statis
          $CC -O3 -static update_binary.c -o update-binary
          
          # Pake STRIP punya NDK, jangan punya Ubuntu!
          $STRIP update-binary
          
          echo "✅ Build Sukses!"
          ls -lh update-binary

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-binary-final-v2
          path: update-binary
