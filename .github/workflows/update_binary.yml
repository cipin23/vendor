name: Build update-binary (ARM32 Android 11) - FIXED BRANCH

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git cmake ninja-build python3 \
            libssl-dev pkg-config \
            brotli libbrotli-dev zlib1g-dev [cite: 2, 9]

      - name: Setup Android NDK (r23b)
        run: |
          # Pake r23b biar aman dari error fdsan [cite: 32]
          wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip [cite: 32]
          unzip -q android-ndk-r23b-linux.zip [cite: 32]
          echo "NDK=${{ github.workspace }}/android-ndk-r23b" >> $GITHUB_ENV [cite: 32]

      - name: Clone AOSP Repositories (Safe Mode)
        run: |
          # Pake --depth=1 biar cepet, branch disesuain yang pasti ada
          git clone --depth=1 --branch android-11.0.0_r48 https://android.googlesource.com/platform/bootable/recovery recovery 
          git clone --depth=1 https://android.googlesource.com/platform/system/core core 
          git clone --depth=1 https://android.googlesource.com/platform/system/logging logging 
          git clone --depth=1 https://android.googlesource.com/platform/system/libbase libbase 
          git clone --depth=1 https://android.googlesource.com/platform/system/libziparchive libziparchive 
          git clone --depth=1 https://android.googlesource.com/platform/system/extras extras 

      - name: Build update-binary
        run: |
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export CXX=$TOOLCHAIN/bin/armv7a-linux-androideabi30-clang++
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          
          mkdir -p build_out

          # Flag -I recovery buat fix applypatch.h
          $CXX -O2 -std=c++17 -static \
            -DANDROID -DANDROID_API=30 \
            -DRECOVERY_API_VERSION=3 \
            -D_FILE_OFFSET_BITS=64 \
            -I . \
            -I recovery \
            -I recovery/updater/include \
            -I recovery/otautil/include \
            -I core/base/include \
            -I libbase/include \
            -I logging/log/include \
            -I extras/liblp/include \
            -I libziparchive/include \
            recovery/updater/*.cpp \
            recovery/otautil/*.cpp \
            recovery/applypatch/*.cpp \
            core/base/*.cpp \
            -lz -ldl -lc++_static \
            -o build_out/update-binary

          $STRIP build_out/update-binary
          ls -lh build_out/update-binary

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-binary-arm32
          path: build_out/update-binary
