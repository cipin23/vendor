name: Build update-binary (ARM32) - RUJAK BEBEG CABE 8

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build python3 libssl-dev pkg-config brotli libbrotli-dev zlib1g-dev

      - name: Setup Android NDK (r23b)
        run: |
          # Tetep pake r23b biar aman dari penyakit fdsan di Samsung A02 loe
          wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
          unzip -q android-ndk-r23b-linux.zip
          echo "NDK=${{ github.workspace }}/android-ndk-r23b" >> $GITHUB_ENV

      - name: Clone AOSP Repositories (Verified Android 12)
        run: |
          # Sesuai instruksi suhu: pake branch android12-release
          BRANCH="android12-release"
          URL="https://android.googlesource.com/platform"
          
          git clone --depth=1 --branch $BRANCH $URL/bootable/recovery recovery
          git clone --depth=1 --branch $BRANCH $URL/system/libbase libbase
          git clone --depth=1 --branch $BRANCH $URL/system/logging logging
          git clone --depth=1 --branch $BRANCH $URL/system/libziparchive libziparchive
          git clone --depth=1 --branch $BRANCH $URL/system/core core
          git clone --depth=1 --branch $BRANCH $URL/system/extras extras
          git clone --depth=1 --branch $BRANCH $URL/external/selinux selinux
          
          # Cek lokasi biar gak stat error lagi
          ls -d recovery libbase logging libziparchive core extras selinux

      - name: Create Dummy Headers
        run: |
          # Ngebisukan gtest biar gak ngerujak build-nya
          mkdir -p fake_headers/gtest
          echo "#define FRIEND_TEST(a, b)" > fake_headers/gtest/gtest_prod.h
          touch fake_headers/gtest/gtest.h

      - name: Build update-binary
        run: |
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export CXX=$TOOLCHAIN/bin/armv7a-linux-androideabi30-clang++
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          
          mkdir -p build_out

          # Filter super pedes: buang file test, windows, dan yang gak penting
          # Di Android 12, path logging ada di logging/liblog
          RECOVERY_SRCS=$(find recovery/updater recovery/otautil recovery/applypatch -name "*.cpp" | grep -v "test" | tr '\n' ' ')
          BASE_SRCS=$(find libbase logging/liblog libziparchive -name "*.cpp" -o -name "*.c" | grep -vE "test|benchmark|windows|fuzz" | tr '\n' ' ')
          
          $CXX -O2 -std=c++17 -static \
            -DANDROID -DANDROID_API=30 \
            -DRECOVERY_API_VERSION=3 \
            -I . \
            -I fake_headers \
            -I recovery \
            -I recovery/updater/include \
            -I recovery/otautil/include \
            -I libbase/include \
            -I logging/liblog/include \
            -I core/libcutils/include \
            -I extras/liblp/include \
            -I libziparchive/include \
            -I selinux/libselinux/include \
            $RECOVERY_SRCS \
            $BASE_SRCS \
            -lz -ldl -lc++_static \
            -o build_out/update-binary

          $STRIP build_out/update-binary
          ls -lh build_out/update-binary

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-binary-rujak-bebeg
          path: build_out/update-binary
