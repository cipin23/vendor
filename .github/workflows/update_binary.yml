name: Build update-binary (ARM32 Android 11) - MASTER BAKPAO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build python3 libssl-dev pkg-config brotli libbrotli-dev zlib1g-dev

      - name: Setup Android NDK (r23b)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
          unzip -q android-ndk-r23b-linux.zip
          echo "NDK=${{ github.workspace }}/android-ndk-r23b" >> $GITHUB_ENV

      - name: Clone AOSP Repositories (Strict Android 11)
        run: |
          # Pake android11-release biar SEMUA repo sinkron di API 30
          BRANCH="android11-release"
          git clone --depth=1 --branch $BRANCH https://android.googlesource.com/platform/bootable/recovery recovery
          git clone --depth=1 --branch $BRANCH https://android.googlesource.com/platform/system/core core
          git clone --depth=1 --branch $BRANCH https://android.googlesource.com/platform/system/libbase libbase
          git clone --depth=1 --branch $BRANCH https://android.googlesource.com/platform/system/logging logging
          git clone --depth=1 --branch $BRANCH https://android.googlesource.com/platform/system/libziparchive libziparchive
          git clone --depth=1 --branch $BRANCH https://android.googlesource.com/platform/system/extras extras
          git clone --depth=1 --branch $BRANCH https://android.googlesource.com/platform/external/selinux selinux
          git clone --depth=1 --branch $BRANCH https://android.googlesource.com/platform/external/bsdiff bsdiff

      - name: Create Dummy Headers for Bypass
        run: |
          # Ngebypass error 'gtest/gtest_prod.h' tanpa harus narik full repo testing Google
          mkdir -p fake_headers/gtest
          echo "#define FRIEND_TEST(test_case_name, test_name)" > fake_headers/gtest/gtest_prod.h
          echo "#define EXPECT_EQ(a, b)" > fake_headers/gtest/gtest.h

      - name: Build update-binary
        run: |
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export CXX=$TOOLCHAIN/bin/armv7a-linux-androideabi30-clang++
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          
          mkdir -p build_out

          # FILTER CERDAS: Ambil .cpp tapi BUANG semua test, benchmark, dan windows
          RECOVERY_SRCS=$(find recovery/updater recovery/otautil recovery/applypatch recovery/edify -name "*.cpp" 2>/dev/null | grep -v "test" | tr '\n' ' ')
          CORE_SRCS=$(find core/libcutils libbase logging/liblog libziparchive -name "*.cpp" -o -name "*.cc" 2>/dev/null | grep -v "test" | grep -v "benchmark" | grep -v "windows" | grep -v "fuzz" | tr '\n' ' ')
          
          $CXX -O2 -std=c++17 -static \
            -DANDROID -DANDROID_API=30 \
            -DRECOVERY_API_VERSION=3 \
            -D_FILE_OFFSET_BITS=64 \
            -I . \
            -I fake_headers \
            -I recovery \
            -I recovery/updater/include \
            -I recovery/otautil/include \
            -I recovery/edify/include \
            -I core/libcutils/include \
            -I libbase/include \
            -I logging/liblog/include \
            -I extras/liblp/include \
            -I libziparchive/include \
            -I selinux/libselinux/include \
            -I bsdiff/include \
            $RECOVERY_SRCS \
            $CORE_SRCS \
            -lz -ldl -lc++_static -lssl -lcrypto \
            -o build_out/update-binary

          $STRIP build_out/update-binary
          ls -lh build_out/update-binary

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-binary-arm32
          path: build_out/update-binary
